<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de ID por Nombre</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Alerts</title>
    <style>
      :root {
        --alert-background-color-red: #ff9999;
        --alert-background-color-blue: #9999ff;
      }
  
      .custom-alert {
        padding: 10px;
        border-radius: 5px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
  
  <script>
    function createAlert(text, color) {
      const alertDiv = document.createElement('div');
      alertDiv.textContent = text;
      alertDiv.classList.add('custom-alert');
      alertDiv.style.backgroundColor = color;
      document.body.appendChild(alertDiv);
    }
  
    // Ejemplo de uso
    createAlert('Este es un mensaje de alerta', 'var(--alert-background-color-red)');
    createAlert('Este es otro mensaje de alerta', 'var(--alert-background-color-blue)');
  </script>
  
  </body>
  </html>
</body>
</html>
