<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMP | Asistencias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/styles.css">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center" >      
            <div class="col-lg-6">
                <form id="formCreateGroups" action="" class="needs-validation" novalidate>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="nameGroup" placeholder="Nombre" required>
                        <label for="floatingInput">Nombre</label>
                        <div class="invalid-feedback">
                            Na na na, primero le ponés un nombre y después lo creas
                        </div>
                    </div>
                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="descriptionGroup" placeholder="Descripción" >
                        <label for="floatingInput">Descripción</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Crear grupo</button>
                    <a href="listGroups.html"></a>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script  src="scripts/modals/modalSuccess.js"></script>
    <script  src="scripts/modals/modalConfirm.js"></script>
    <script  src="scripts/pages/fetch.js"></script>
    <script  src="scripts/pages/groups.js"></script>
    <script  src="scripts/validation.js"></script>

</body>

</html>
