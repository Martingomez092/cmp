<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMP | Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anek+Latin:wght@100..800&family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Dosis:wght@200..800&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Readex+Pro:wght@160..700&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <a href="admin.html">Admin</a>
                <form class="pt-5 mb-5" >
                    <div class="mb-3">
                        <label class="form-label">Grupo</label>
                        <select id="selectGroup">
                            <option value="">Selecciona un grupo</option>
                          </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bailarina</label>
                      
                          
                          <select id="selectDancers">
                            <option value="">Selecciona un bailarín</option>
                          </select>
                    </div>
                    <div class="d-flex justify-content-end gap-3 my-4">
                        <button class="btn btn-primary" id="searchBTN" type="button" disabled>Consultar</button>
                    </div>
                    <hr>
                </form>
                <div class="d-none" id="results">
                    <ul class="nav nav-tabs" id="myTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#payments-tab-pane"
                                type="button" role="tab">Pagos</button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="profile-tab" data-bs-toggle="tab" data-bs-target="#attendances-tab-pane"
                                type="button" role="tab">Asistencias</button>
                        </li>
                    </ul>
                      <div class="tab-content" id="myTabContent">
                        <div class="tab-pane fade show active px-2 pt-4" id="payments-tab-pane" role="tabpanel" aria-labelledby="home-tab" tabindex="0">
                            <div id="payment-status-alert"></div>
                            <div id="payment-status-table"></div>
                        </div>
                        <div class="tab-pane fade px-2 pt-4" id="attendances-tab-pane" role="tabpanel" aria-labelledby="profile-tab" tabindex="0">...</div>
                      </div>
                </div>         
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
<script  src="scripts/components/header.js"></script>
<script  src="scripts/modals/modalSuccess.js"></script>
<script  src="scripts/modals/modalConfirm.js"></script>
<script  src="scripts/pages/fetch.js"></script>
<script  src="scripts/pages/groups.js"></script>
<script  src="scripts/validation.js"></script>

</body>
